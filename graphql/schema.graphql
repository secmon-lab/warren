type TagObject {
  id: ID!
  name: String!
}

type Ticket {
  id: ID!
  status: String!
  title: String!
  description: String!
  summary: String!
  assignee: User
  alerts: [Alert!]!
  alertsPaginated(offset: Int, limit: Int): AlertsResponse!
  alertsCount: Int!
  conclusion: String
  reason: String
  finding: Finding
  slackLink: String
  createdAt: String!
  updatedAt: String!
  resolvedAt: String
  archivedAt: String
  isTest: Boolean!
  tags: [String!]!
  tagObjects: [TagObject!]!
}

type User {
  id: ID!
  name: String!
  icon: String
}

enum AlertStatus {
  ACTIVE
  DECLINED
}

type Alert {
  id: ID!
  title: String!
  description: String
  schema: String!
  data: String!
  attributes: [AlertAttribute!]!
  status: AlertStatus!
  createdAt: String!
  ticket: Ticket
  tags: [String!]!
  tagObjects: [TagObject!]!
}

type AlertAttribute {
  key: String!
  value: String!
  link: String
  auto: Boolean!
}

type Finding {
  severity: String!
  summary: String!
  reason: String!
  recommendation: String!
}

type TicketsResponse {
  tickets: [Ticket!]!
  totalCount: Int!
}

type Activity {
  id: ID!
  type: String!
  userID: String
  alertID: String
  ticketID: String
  commentID: String
  createdAt: String!
  metadata: String
  user: User
  alert: Alert
  ticket: Ticket
}

type ActivitiesResponse {
  activities: [Activity!]!
  totalCount: Int!
}

type AlertsResponse {
  alerts: [Alert!]!
  totalCount: Int!
}

type DashboardStats {
  openTicketsCount: Int!
  unboundAlertsCount: Int!
  declinedAlertsCount: Int!
  queuedAlertsCount: Int!
  openTickets: [Ticket!]!
  unboundAlerts: [Alert!]!
}

type TagMetadata {
  id: ID!
  name: String!
  description: String
  color: String!
  createdAt: String!
  updatedAt: String!
}

type Query {
  ticket(id: ID!): Ticket
  tickets(statuses: [String!], keyword: String, assigneeID: String, offset: Int, limit: Int): TicketsResponse!
  similarTickets(
    ticketId: ID!
    threshold: Float!
    offset: Int
    limit: Int
  ): TicketsResponse!
  similarTicketsForAlert(
    alertId: ID!
    threshold: Float!
    offset: Int
    limit: Int
  ): TicketsResponse!
  alert(id: ID!): Alert
  alerts(offset: Int, limit: Int, status: AlertStatus): AlertsResponse!
  unboundAlerts(
    threshold: Float
    keyword: String
    ticketId: ID
    offset: Int
    limit: Int
  ): AlertsResponse!
  dashboard: DashboardStats!
  activities(offset: Int, limit: Int): ActivitiesResponse!
  tags: [TagMetadata!]!
  availableTagColors: [String!]!
  availableTagColorNames: [String!]!
}

type ArchiveAllResolvedResult {
  archivedCount: Int!
}

type Mutation {
  resolveTicket(id: ID!, conclusion: String!, reason: String!): Ticket!
  reopenTicket(id: ID!): Ticket!
  archiveTicket(id: ID!): Ticket!
  archiveTickets(ids: [ID!]!): [Ticket!]!
  archiveAllResolvedTickets: ArchiveAllResolvedResult!
  unarchiveTicket(id: ID!): Ticket!
  updateTicketConclusion(id: ID!, conclusion: String!, reason: String!): Ticket!
  updateTicket(id: ID!, title: String!, description: String): Ticket!
  createTicket(title: String!, description: String!, isTest: Boolean): Ticket!
  createTicketFromAlerts(
    alertIds: [ID!]!
    title: String
    description: String
  ): Ticket!
  bindAlertsToTicket(ticketId: ID!, alertIds: [ID!]!): Ticket!
  updateAlertTags(alertId: ID!, tagIds: [ID!]!): Alert!
  updateTicketTags(ticketId: ID!, tagIds: [ID!]!): Ticket!
  createTag(name: String!): TagMetadata!
  deleteTag(id: ID!): Boolean!
  updateTag(input: UpdateTagInput!): TagMetadata!
  declineAlerts(ids: [ID!]!): [Alert!]!

  # chat-session-redesign: respond to a pending HITL request from the
  # Web UI. approved=true means "approve" for tool_approval requests or
  # "submit the selected answer" for question requests. answer/comment
  # are optional. Returns the updated HITLRequest with Status populated.
  resolveHITLRequest(
    id: ID!
    approved: Boolean!
    answer: String
    comment: String
  ): HITLRequest!
}

input UpdateTagInput {
  id: ID!
  name: String!
  color: String!
  description: String
}

type Session {
  id: ID!
  ticketID: ID!
  status: String!
  userID: String
  user: User
  query: String
  slackURL: String
  intent: String
  createdAt: String!
  updatedAt: String!
  # chat-session-redesign: source channel (slack/web/cli). Empty when
  # a pre-redesign Session has not been backfilled yet.
  source: String!
}

type SessionMessage {
  id: ID!
  sessionID: ID!
  turnID: ID
  ticketID: ID
  type: String!
  content: String!
  author: MessageAuthor
  createdAt: String!
  updatedAt: String!
  # Revisions is the chronologically-ordered list of prior content
  # values for updatable messages (e.g. task progress, HITL prompts).
  # Empty for messages that have never been updated in-place.
  revisions: [MessageRevision!]
}

type MessageRevision {
  content: String!
  createdAt: String!
}

# HITLRequest mirrors the domain hitl.Request model. The payload shape
# is intentionally a JSON scalar (encoded as String) because it is
# already transport-shape-specific (tool_approval vs question) and the
# frontend renders both variants from the same envelope.
type HITLRequest {
  id: ID!
  sessionID: ID!
  type: String!
  status: String!
  userID: String
  # Payload / response are serialized JSON strings so the frontend can
  # parse them directly. Having the same wire shape as the
  # hitl_request_pending envelope avoids a second translation layer.
  payload: String
  response: String
  createdAt: String!
  respondedAt: String
}

type MessageAuthor {
  userID: String!
  displayName: String!
  slackUserID: String
  email: String
}

extend type Query {
  ticketSessions(ticketId: ID!): [Session!]!
  session(id: ID!): Session
  sessionMessages(sessionId: ID!): [SessionMessage!]!
  # chat-session-redesign Phase 3.4: unified replacement for the legacy
  # ticketComments query. Returns messages across every Session bound
  # to the ticket with optional source/type filters.
  ticketSessionMessages(
    ticketId: ID!
    source: String
    type: String
    offset: Int
    limit: Int
  ): [SessionMessage!]!
}

enum SortOrder {
  ASC
  DESC
}

type DiagnosisIssue {
  id: ID!
  diagnosisID: ID!
  ruleID: String!
  targetID: String!
  description: String!
  status: String!
  fixedAt: String
  failReason: String
  createdAt: String!
}

type DiagnosisIssuesResponse {
  issues: [DiagnosisIssue!]!
  totalCount: Int!
}

# Issue counts are derived from subcollection aggregation queries (not stored in this object).
type Diagnosis {
  id: ID!
  status: String!
  totalCount: Int!
  pendingCount: Int!
  fixedCount: Int!
  failedCount: Int!
  createdAt: String!
  updatedAt: String!
}

type DiagnosesResponse {
  diagnoses: [Diagnosis!]!
  totalCount: Int!
}

extend type Query {
  diagnoses(offset: Int, limit: Int): DiagnosesResponse!
  diagnosis(id: ID!): Diagnosis
  diagnosisIssues(diagnosisID: ID!, offset: Int, limit: Int, status: String, ruleID: String): DiagnosisIssuesResponse!
}

extend type Mutation {
  runDiagnosis: Diagnosis!
  fixDiagnosis(id: ID!): Diagnosis!
}

type QueuedAlert {
  id: ID!
  schema: String!
  title: String!
  data: String!
  createdAt: String!
}

type QueuedAlertsResponse {
  alerts: [QueuedAlert!]!
  totalCount: Int!
}

enum ReprocessJobStatus {
  PENDING
  RUNNING
  COMPLETED
  FAILED
}

type ReprocessJob {
  id: ID!
  queuedAlertID: ID!
  status: ReprocessJobStatus!
  error: String
  createdAt: String!
  updatedAt: String!
}

type ReprocessBatchJob {
  id: ID!
  status: ReprocessJobStatus!
  totalCount: Int!
  completedCount: Int!
  failedCount: Int!
  createdAt: String!
  updatedAt: String!
}

extend type Query {
  queuedAlerts(keyword: String, offset: Int, limit: Int): QueuedAlertsResponse!
  reprocessJob(id: ID!): ReprocessJob
  reprocessBatchJob(id: ID!): ReprocessBatchJob
}

extend type Mutation {
  reprocessQueuedAlert(id: ID!): ReprocessJob!
  discardQueuedAlerts(ids: [ID!]!): Boolean!
  discardQueuedAlertsByFilter(keyword: String): Int!
  reprocessQueuedAlertsByFilter(keyword: String): ReprocessBatchJob!
}

# Knowledge: topic-based knowledge store
type Knowledge {
  id: ID!
  category: String!
  title: String!
  claim: String!
  tags: [KnowledgeTag!]!
  authorID: String!
  author: User!
  createdAt: String!
  updatedAt: String!
}

type KnowledgeLog {
  id: ID!
  knowledgeID: ID!
  title: String!
  claim: String!
  authorID: String!
  author: User!
  ticketID: String
  message: String!
  createdAt: String!
}

type KnowledgeTag {
  id: ID!
  name: String!
  description: String!
  createdAt: String!
  updatedAt: String!
}

input CreateKnowledgeInput {
  category: String!
  title: String!
  claim: String!
  tags: [ID!]!
  message: String!
  ticketID: String
}

input UpdateKnowledgeInput {
  id: ID!
  title: String!
  claim: String!
  tags: [ID!]!
  message: String!
  ticketID: String
}

input CreateKnowledgeTagInput {
  name: String!
  description: String
}

input UpdateKnowledgeTagInput {
  id: ID!
  name: String!
  description: String
}

extend type Query {
  knowledges(category: String, tags: [ID!], keyword: String): [Knowledge!]!
  knowledge(id: ID!): Knowledge
  knowledgeLogs(knowledgeID: ID!): [KnowledgeLog!]!
  knowledgeTags: [KnowledgeTag!]!
}

extend type Mutation {
  createKnowledge(input: CreateKnowledgeInput!): Knowledge!
  updateKnowledge(input: UpdateKnowledgeInput!): Knowledge!
  deleteKnowledge(id: ID!, reason: String!): Boolean!
  createKnowledgeTag(input: CreateKnowledgeTagInput!): KnowledgeTag!
  updateKnowledgeTag(input: UpdateKnowledgeTagInput!): KnowledgeTag!
  deleteKnowledgeTag(id: ID!): Boolean!
  mergeKnowledgeTags(oldID: ID!, newID: ID!): Boolean!
}

schema {
  query: Query
  mutation: Mutation
}
